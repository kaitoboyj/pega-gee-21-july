[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  CI = "false"
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"
  NETLIFY_USE_BUN = "false"
  NETLIFY_USE_PNPM = "false"
  NETLIFY_USE_YARN = "false"
  NODE_OPTIONS = "--max-old-space-size=4096"
  PUPPETEER_SKIP_DOWNLOAD = "true"
  PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"
  # Public Lovable Cloud client configuration used by Vite at build time.
  VITE_SUPABASE_URL = "https://itrvpcpvftffeovazbqs.supabase.co"
  VITE_SUPABASE_PUBLISHABLE_KEY = "sb_publishable__UKEM8OLzzL-SGd0AtedWA_ZZ_TKfw-"
  VITE_SUPABASE_PROJECT_ID = "itrvpcpvftffeovazbqs"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

